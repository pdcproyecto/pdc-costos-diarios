<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Control de Costos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    📊 Control de Costos <span>Packing del Carmen SAC</span>
  </div>
  <div class="navbar-right">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="carga.html">Ingresar datos</a>
    <span id="navNombre" style="color:rgba(255,255,255,.6);font-size:13px;"></span>
    <button id="btnLogout">Salir</button>
  </div>
</nav>

<div class="page">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
    <div>
      <h1>Resumen de Costos Diarios</h1>
      <p class="text-muted">Proyectado vs. Ejecutado por día</p>
    </div>
    <div class="controles">
      <label>Mes:</label>
      <input type="month" id="filtroMes">
      <button class="btn btn-secondary btn-sm" id="btnCargar">🔄 Actualizar</button>
      <button class="btn btn-secondary btn-sm" id="btnToggleVista" title="Ver proyectado / ejecutado / ambos">👁 Vista: Ejecutado</button>
    </div>
  </div>

  <!-- KPIs rápidos -->
  <div id="kpiRow" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;"></div>

  <!-- Tabla principal -->
  <div class="card" style="padding:0;">
    <div class="tabla-wrapper" id="tablaWrapper">
      <div class="flex-center" style="padding:60px;" id="placeholderMsg">
        <div style="text-align:center;color:var(--texto-sec);">
          <div style="font-size:40px;margin-bottom:10px;">📋</div>
          <p>Selecciona un mes y presiona <strong>Actualizar</strong></p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="api.js"></script>
<script>
// ============================================================
// Dashboard principal
// ============================================================

Auth.requireAuth();
document.getElementById('navNombre').textContent = Auth.getNombre();

// Estados de vista
const VISTAS = ['ejecutado', 'proyectado', 'ambos'];
let vistaIdx = 0;
let dataMes = null;

// Inicializar filtro al mes actual
const hoy = new Date();
document.getElementById('filtroMes').value =
  hoy.getFullYear() + '-' + String(hoy.getMonth() + 1).padStart(2, '0');

// Logout
document.getElementById('btnLogout').addEventListener('click', async () => {
  try { await API.logout(); } catch(e) {}
  Auth.clear();
  window.location.href = 'index.html';
});

// Vista toggle
document.getElementById('btnToggleVista').addEventListener('click', () => {
  vistaIdx = (vistaIdx + 1) % VISTAS.length;
  const labels = { ejecutado: '👁 Vista: Ejecutado', proyectado: '👁 Vista: Proyectado', ambos: '👁 Vista: Ambos' };
  document.getElementById('btnToggleVista').textContent = labels[VISTAS[vistaIdx]];
  if (dataMes) renderTabla(dataMes);
});

// Cargar datos
document.getElementById('btnCargar').addEventListener('click', cargarMes);
document.getElementById('filtroMes').addEventListener('change', cargarMes);

async function cargarMes() {
  const val = document.getElementById('filtroMes').value;
  if (!val) return;
  const [anio, mes] = val.split('-').map(Number);

  document.getElementById('loadingOverlay').classList.remove('hidden');
  try {
    const res = await API.getResumenMes(anio, mes);
    dataMes = res.data;
    renderKPIs(dataMes);
    renderTabla(dataMes);
  } catch (err) {
    mostrarToast('Error al cargar datos: ' + err.message, 'error');
  } finally {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

// ============================================================
// Cálculo de valores por día
// ============================================================

function calcularDia(estructura_id, tipo_calculo, dia, data, vista) {
  const { anio, mes, diasMes, proyectado, produccion, ejecutado } = data;
  const fecha = fechaISO(anio, mes, dia);

  // ---- Producción del día (suma de todos los cultivos) ----
  const prodDia = produccion.filter(p => {
    const f = String(p.fecha).substring(0, 10);
    return f === fecha;
  });

  const kgExpProy = prodDia.reduce((s, p) => s + (parseFloat(p.kg_exportables_proy) || 0), 0);
  const kgExpReal = prodDia.reduce((s, p) => s + (parseFloat(p.kg_exportables_real) || 0), 0);
  const hayEjecutadoProd = prodDia.some(p => parseFloat(p.kg_exportables_real) > 0);

  // Kg a usar según disponibilidad
  const kgParaRatio = hayEjecutadoProd ? kgExpReal : kgExpProy;

  // ---- Item de proyectado mensual ----
  const itemProy = proyectado.find(p => String(p.estructura_id) === String(estructura_id));
  const valorProy = parseFloat(itemProy?.valor) || 0;

  // ---- Valor proyectado del día ----
  let proy = 0;
  if (tipo_calculo === 'ratio') {
    proy = valorProy * kgParaRatio; // ratio * kg exportables del día
  } else {
    proy = diasMes > 0 ? valorProy / diasMes : 0; // monto mensual / días
  }

  // ---- Valor ejecutado del día ----
  let ejec = null;
  if (tipo_calculo === 'ratio') {
    const itemEjec = ejecutado.find(e =>
      String(e.fecha).substring(0, 10) === fecha &&
      String(e.estructura_id) === String(estructura_id)
    );
    ejec = itemEjec ? parseFloat(itemEjec.valor_usd) : null;
  } else {
    // monto_mensual: siempre igual al proyectado
    ejec = proy;
  }

  // ---- Valor a mostrar según vista ----
  if (vista === 'proyectado') return proy;
  if (vista === 'ejecutado')  return ejec !== null ? ejec : proy;
  // 'ambos' → retorna objeto
  return { proy, ejec };
}

function calcularTotalFila(estructuraId, tipoCalculo, data, vista) {
  const { diasMes } = data;
  let total = 0;
  for (let d = 1; d <= diasMes; d++) {
    const v = calcularDia(estructuraId, tipoCalculo, d, data, vista);
    if (vista === 'ambos') {
      total += v.ejec !== null ? v.ejec : v.proy;
    } else {
      total += (v || 0);
    }
  }
  return total;
}

function calcularVentaDia(dia, data, vista) {
  const { anio, mes } = data;
  const fecha = fechaISO(anio, mes, dia);
  const prodDia = data.produccion.filter(p => String(p.fecha).substring(0, 10) === fecha);

  const ventaProy = prodDia.reduce((s, p) => s + (parseFloat(p.kg_exportables_proy) || 0) * (parseFloat(p.tarifa) || 0), 0);
  const ventaReal = prodDia.reduce((s, p) => s + (parseFloat(p.venta) || 0), 0);
  const hayEjec   = prodDia.some(p => parseFloat(p.venta) > 0);

  if (vista === 'proyectado') return ventaProy;
  if (vista === 'ejecutado')  return hayEjec ? ventaReal : ventaProy;
  return { proy: ventaProy, ejec: hayEjec ? ventaReal : null };
}

// ============================================================
// Render KPIs
// ============================================================

function renderKPIs(data) {
  const { diasMes, anio, mes } = data;
  const vista = VISTAS[vistaIdx];

  let totalVenta = 0, totalCDV = 0, totalCDF = 0, totalCIV = 0, totalGF = 0;

  for (let d = 1; d <= diasMes; d++) {
    const v = calcularVentaDia(d, data, 'ejecutado');
    totalVenta += typeof v === 'object' ? (v.ejec !== null ? v.ejec : v.proy) : v;
  }

  const nivel1Groups = { 'Costo Directo Variable': 0, 'Costo Directo Fijo': 0, 'Costo Indirecto Variable': 0, 'Gastos Fijos': 0 };
  data.estructura.forEach(item => {
    const t = calcularTotalFila(item.id, item.tipo_calculo, data, 'ejecutado');
    if (nivel1Groups[item.nivel1] !== undefined) nivel1Groups[item.nivel1] += t;
  });
  totalCDV = nivel1Groups['Costo Directo Variable'];
  totalCDF = nivel1Groups['Costo Directo Fijo'];
  totalCIV = nivel1Groups['Costo Indirecto Variable'];
  totalGF  = nivel1Groups['Gastos Fijos'];

  const mdc = totalVenta - totalCDV;
  const utilBruta = mdc - totalCDF - totalCIV;
  const utilOp = utilBruta - totalGF;

  const kpis = [
    { label: 'Venta', valor: totalVenta, icon: '💰', color: 'var(--verde)' },
    { label: 'Margen contribución', valor: mdc, icon: '📈', color: mdc >= 0 ? 'var(--verde)' : 'var(--rojo)' },
    { label: 'Utilidad bruta', valor: utilBruta, icon: '⚖️', color: utilBruta >= 0 ? 'var(--verde)' : 'var(--rojo)' },
    { label: 'Utilidad operativa', valor: utilOp, icon: utilOp >= 0 ? '✅' : '❌', color: utilOp >= 0 ? 'var(--verde)' : 'var(--rojo)' },
  ];

  document.getElementById('kpiRow').innerHTML = kpis.map(k => `
    <div class="card" style="flex:1;min-width:160px;padding:14px 18px;margin-bottom:0;">
      <div style="font-size:11px;color:var(--texto-sec);font-weight:500;text-transform:uppercase;letter-spacing:.5px;">${k.label}</div>
      <div style="font-size:22px;font-weight:700;color:${k.color};margin-top:4px;">${k.icon} ${fmtMoneda(k.valor)}</div>
    </div>
  `).join('');
}

// ============================================================
// Render tabla principal
// ============================================================

function renderTabla(data) {
  const { estructura, diasMes, anio, mes } = data;
  const vista = VISTAS[vistaIdx];
  document.getElementById('placeholderMsg')?.remove();

  // Agrupar estructura
  const nivel1s = [...new Set(estructura.map(i => i.nivel1))];

  let html = `<table class="costos" id="tablaCostos">
    <thead>
      <tr>
        <th class="col-estructura">Ítem de costo</th>
        <th style="min-width:80px;background:rgba(0,0,0,.15);">TOTAL</th>`;

  for (let d = 1; d <= diasMes; d++) {
    const dow = ['D','L','M','X','J','V','S'][new Date(anio, mes-1, d).getDay()];
    html += `<th style="min-width:72px;">${d}<br><span style="font-weight:400;opacity:.7;font-size:10px;">${dow}</span></th>`;
  }
  html += `</tr></thead><tbody>`;

  // --- Fila de venta ---
  html += `<tr class="resumen-venta">
    <td class="col-estructura">💰 VENTA</td>`;
  let totalVentaTotal = 0;
  const ventaDias = [];
  for (let d = 1; d <= diasMes; d++) {
    const v = calcularVentaDia(d, data, vista);
    let val;
    if (vista === 'ambos') {
      val = v.ejec !== null ? v.ejec : v.proy;
      totalVentaTotal += val;
      ventaDias.push(val);
      html += `<td>${v.ejec !== null ? `<span title="Ejecutado" style="color:#a7f3d0;">${fmtMoneda(v.ejec)}</span>` : `<span title="Proyectado" style="opacity:.7;">${fmtMoneda(v.proy)}</span>`}</td>`;
    } else {
      val = typeof v === 'object' ? (v.ejec !== null ? v.ejec : v.proy) : v;
      totalVentaTotal += val;
      ventaDias.push(val);
      html += `<td>${fmtMoneda(val)}</td>`;
    }
  }
  html = insertarTotal(html, totalVentaTotal);
  html += `</tr>`;

  // Totales por nivel1 para calcular márgenes
  const totalesPorNivel1 = {};
  const totalesDiaPorNivel1 = {};
  nivel1s.forEach(n1 => {
    totalesPorNivel1[n1] = 0;
    totalesDiaPorNivel1[n1] = new Array(diasMes).fill(0);
  });

  // --- Filas de costos ---
  nivel1s.forEach(n1 => {
    const itemsN1 = estructura.filter(i => i.nivel1 === n1);
    const nivel2s = [...new Set(itemsN1.map(i => i.nivel2))];

    // Calcular totales del nivel1
    let totalN1 = 0;
    const diasN1 = new Array(diasMes).fill(0);

    // Row nivel 1
    html += `<tr class="nivel1" data-n1="${n1}">
      <td class="col-estructura">${n1}</td>
      <td class="total-col" id="tot-n1-${n1.replace(/\s/g,'_')}">—</td>`;
    for (let d = 1; d <= diasMes; d++) html += `<td id="dia-n1-${n1.replace(/\s/g,'_')}-${d}">—</td>`;
    html += `</tr>`;

    nivel2s.forEach(n2 => {
      const itemsN2 = itemsN1.filter(i => i.nivel2 === n2);
      let totalN2 = 0;
      const diasN2 = new Array(diasMes).fill(0);

      html += `<tr class="nivel2" data-n1="${n1}" data-n2="${n2}">
        <td class="col-estructura">${n2}</td>
        <td class="total-col" id="tot-n2-${slug(n2)}">—</td>`;
      for (let d = 1; d <= diasMes; d++) html += `<td id="dia-n2-${slug(n2)}-${d}">—</td>`;
      html += `</tr>`;

      itemsN2.forEach(item => {
        let totalItem = 0;
        html += `<tr class="nivel3" data-n1="${n1}" data-n2="${n2}">
          <td class="col-estructura">${item.nivel3}</td>`;

        // Total primero (placeholder), luego días
        let rowTot = 0;
        let daysCells = '';
        for (let d = 1; d <= diasMes; d++) {
          const v = calcularDia(item.id, item.tipo_calculo, d, data, vista);
          let val, display;
          if (vista === 'ambos') {
            val = v.ejec !== null ? v.ejec : v.proy;
            display = v.ejec !== null
              ? `<span style="color:var(--verde-dark);font-weight:600;">${fmtMoneda(v.ejec)}</span>`
              : `<span style="opacity:.55;">${fmtMoneda(v.proy)}</span>`;
          } else {
            val = v || 0;
            display = fmtMoneda(val);
          }
          rowTot += val;
          diasN2[d-1] += val;
          diasN1[d-1] += val;
          daysCells += `<td>${display}</td>`;
        }
        totalItem = rowTot;
        totalN2 += rowTot;
        totalN1 += rowTot;
        totalesPorNivel1[n1] += rowTot;
        html += `<td class="total-col font-bold">${fmtMoneda(rowTot)}</td>`;
        html += daysCells;
        html += `</tr>`;
      });

      // Rellenar nivel2
      html = html.replace(`id="tot-n2-${slug(n2)}">—`, `id="tot-n2-${slug(n2)}">${fmtMoneda(totalN2)}`);
      for (let d = 1; d <= diasMes; d++) {
        html = html.replace(`id="dia-n2-${slug(n2)}-${d}">—`, `id="dia-n2-${slug(n2)}-${d}">${fmtMoneda(diasN2[d-1])}`);
      }
    }); // end nivel2

    // Rellenar nivel1
    for (let d = 1; d <= diasMes; d++) {
      totalesDiaPorNivel1[n1][d-1] = diasN1[d-1];
      html = html.replace(`id="dia-n1-${n1.replace(/\s/g,'_')}-${d}">—`, `id="dia-n1-${n1.replace(/\s/g,'_')}-${d}">${fmtMoneda(diasN1[d-1])}`);
    }
    html = html.replace(`id="tot-n1-${n1.replace(/\s/g,'_')}">—`, `id="tot-n1-${n1.replace(/\s/g,'_')}">${fmtMoneda(totalN1)}`);
    totalesPorNivel1[n1] = totalN1;

    // --- Filas de resumen después de cada bloque ---
    if (n1 === 'Costo Directo Variable') {
      html += filaResumen('📊 MARGEN CONTRIBUCIÓN DIRECTO',
        totalVentaTotal - totalN1,
        ventaDias.map((v, i) => v - totalesDiaPorNivel1['Costo Directo Variable'][i]),
        diasMes);
    }
    if (n1 === 'Costo Directo Fijo') {
      const mdcTotal = totalVentaTotal - (totalesPorNivel1['Costo Directo Variable'] || 0);
      const mdc2 = mdcTotal - totalN1;
      html += filaResumen('📊 MARGEN CONTRIBUCIÓN TOTAL', mdc2,
        ventaDias.map((v, i) => v
          - (totalesDiaPorNivel1['Costo Directo Variable']?.[i] || 0)
          - (totalesDiaPorNivel1['Costo Directo Fijo']?.[i] || 0)),
        diasMes);
    }
    if (n1 === 'Costo Indirecto Variable') {
      const ub = totalVentaTotal
        - (totalesPorNivel1['Costo Directo Variable'] || 0)
        - (totalesPorNivel1['Costo Directo Fijo'] || 0)
        - totalN1;
      html += filaResumen('⚖️ UTILIDAD BRUTA', ub,
        ventaDias.map((v, i) => v
          - (totalesDiaPorNivel1['Costo Directo Variable']?.[i] || 0)
          - (totalesDiaPorNivel1['Costo Directo Fijo']?.[i] || 0)
          - (totalesDiaPorNivel1['Costo Indirecto Variable']?.[i] || 0)),
        diasMes, true);
    }
    if (n1 === 'Gastos Fijos') {
      const uop = totalVentaTotal
        - (totalesPorNivel1['Costo Directo Variable'] || 0)
        - (totalesPorNivel1['Costo Directo Fijo'] || 0)
        - (totalesPorNivel1['Costo Indirecto Variable'] || 0)
        - totalN1;
      html += filaResumen('🏁 UTILIDAD OPERATIVA MAQUILA', uop,
        ventaDias.map((v, i) => v
          - (totalesDiaPorNivel1['Costo Directo Variable']?.[i] || 0)
          - (totalesDiaPorNivel1['Costo Directo Fijo']?.[i] || 0)
          - (totalesDiaPorNivel1['Costo Indirecto Variable']?.[i] || 0)
          - (totalesDiaPorNivel1['Gastos Fijos']?.[i] || 0)),
        diasMes, true);
    }
  }); // end nivel1

  html += '</tbody></table>';
  document.getElementById('tablaWrapper').innerHTML = html;
  bindCollapseEvents();
}

function insertarTotal(html, total) {
  // Inserta el total antes del primer <td> de días
  // El placeholder es </td> después del col-estructura
  return html.replace('</td>\n    <td>', `</td>\n    <td class="total-col font-bold">${fmtMoneda(total)}</td>\n    <td>`);
}

function filaResumen(label, total, diasVals, diasMes, grande = false) {
  const clase = grande
    ? (total >= 0 ? 'utilidad utilidad-pos' : 'utilidad utilidad-neg')
    : 'resumen';
  let html = `<tr class="${clase}">
    <td class="col-estructura">${label}</td>
    <td class="total-col">${fmtMoneda(total)}</td>`;
  for (let d = 0; d < diasMes; d++) {
    html += `<td>${fmtMoneda(diasVals[d])}</td>`;
  }
  html += `</tr>`;
  return html;
}

function slug(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

// ============================================================
// Colapsar/expandir filas
// ============================================================
function bindCollapseEvents() {
  // Nivel 1
  document.querySelectorAll('tr.nivel1').forEach(tr => {
    tr.querySelector('.col-estructura').addEventListener('click', () => {
      const n1 = tr.dataset.n1;
      const collapsed = tr.classList.toggle('collapsed');
      document.querySelectorAll(`tr[data-n1="${n1}"].nivel2, tr[data-n1="${n1}"].nivel3`)
        .forEach(r => r.classList.toggle('hidden', collapsed));
    });
  });

  // Nivel 2
  document.querySelectorAll('tr.nivel2').forEach(tr => {
    tr.querySelector('.col-estructura').addEventListener('click', (e) => {
      e.stopPropagation();
      const n1 = tr.dataset.n1, n2 = tr.dataset.n2;
      const collapsed = tr.classList.toggle('collapsed');
      document.querySelectorAll(`tr.nivel3[data-n1="${n1}"][data-n2="${n2}"]`)
        .forEach(r => r.classList.toggle('hidden', collapsed));
    });
  });
}

// Cargar al entrar
cargarMes();
</script>
</body>
</html>
