<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Control de Costos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    📊 Control de Costos <span>Packing del Carmen SAC</span>
  </div>
  <div class="navbar-right">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="carga.html">Ingresar datos</a>
    <span id="navNombre" style="color:rgba(255,255,255,.6);font-size:13px;"></span>
    <button id="btnLogout">Salir</button>
  </div>
</nav>

<div class="page">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
    <div>
      <h1>Resumen de Costos</h1>
      <p class="text-muted">Proyectado vs. Ejecutado</p>
    </div>
    <div class="controles">
      <label>Mes:</label>
      <input type="month" id="filtroMes">
      <button class="btn btn-secondary btn-sm" id="btnCargar">🔄 Actualizar</button>
      <button class="btn btn-secondary btn-sm" id="btnToggleVista">👁 Vista: Ejecutado</button>
    </div>
  </div>

  <!-- KPIs -->
  <div id="kpiRow" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="diario">📅 Diario</button>
    <button class="tab-btn" data-tab="resumen">📊 Resumen mensual</button>
  </div>

  <!-- Tab Diario -->
  <div class="tab-panel active" id="tab-diario">
    <div class="card" style="padding:0;">
      <div class="tabla-wrapper" id="tablaWrapper">
        <div class="flex-center" style="padding:60px;" id="placeholderMsg">
          <div style="text-align:center;color:var(--texto-sec);">
            <div style="font-size:40px;margin-bottom:10px;">📋</div>
            <p>Selecciona un mes y presiona <strong>Actualizar</strong></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab Resumen mensual -->
  <div class="tab-panel" id="tab-resumen">
    <div class="card" style="padding:0;">
      <div class="tabla-wrapper" id="tablaResumenWrapper">
        <div class="flex-center" style="padding:60px;">
          <div style="text-align:center;color:var(--texto-sec);">
            <div style="font-size:40px;margin-bottom:10px;">📊</div>
            <p>Carga un mes para ver el resumen</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay hidden" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="api.js"></script>
<script>
Auth.requireAuth();
document.getElementById('navNombre').textContent = Auth.getNombre();

const VISTAS = ['ejecutado', 'proyectado', 'ambos'];
let vistaIdx = 0;
let dataMes = null;

const hoy = new Date();
document.getElementById('filtroMes').value =
  hoy.getFullYear() + '-' + String(hoy.getMonth() + 1).padStart(2, '0');

document.getElementById('btnLogout').addEventListener('click', async () => {
  try { await API.logout(); } catch(e) {}
  Auth.clear();
  window.location.href = 'index.html';
});

document.getElementById('btnToggleVista').addEventListener('click', () => {
  vistaIdx = (vistaIdx + 1) % VISTAS.length;
  const labels = { ejecutado: '👁 Vista: Ejecutado', proyectado: '👁 Vista: Proyectado', ambos: '👁 Vista: Ambos' };
  document.getElementById('btnToggleVista').textContent = labels[VISTAS[vistaIdx]];
  if (dataMes) { renderTabla(dataMes); renderResumen(dataMes); }
});

document.getElementById('btnCargar').addEventListener('click', cargarMes);
document.getElementById('filtroMes').addEventListener('change', cargarMes);

// Tabs
document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn[data-tab]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

async function cargarMes() {
  const val = document.getElementById('filtroMes').value;
  if (!val) return;
  const [anio, mes] = val.split('-').map(Number);
  document.getElementById('loadingOverlay').classList.remove('hidden');
  try {
    const res = await API.getResumenMes(anio, mes);
    dataMes = res.data;
    renderKPIs(dataMes);
    renderTabla(dataMes);
    renderResumen(dataMes);
  } catch (err) {
    mostrarToast('Error: ' + err.message, 'error');
  } finally {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

// ============================================================
// Helpers de cálculo
// ============================================================

function prodDelDia(dia, data) {
  const fecha = fechaISO(data.anio, data.mes, dia);
  return data.produccion.filter(p => String(p.fecha).substring(0, 10) === fecha);
}

function kgsDia(dia, data) {
  const prod = prodDelDia(dia, data);
  const kgProcProy  = prod.reduce((s,p) => s + (parseFloat(p.kg_procesados_proy)  || 0), 0);
  const kgExpProy   = prod.reduce((s,p) => s + (parseFloat(p.kg_exportables_proy) || 0), 0);
  const kgProcReal  = prod.reduce((s,p) => s + (parseFloat(p.kg_procesados_real)  || 0), 0);
  const kgExpReal   = prod.reduce((s,p) => s + (parseFloat(p.kg_exportables_real) || 0), 0);
  const hayReal     = prod.some(p => parseFloat(p.kg_procesados_real) > 0);
  return { kgProcProy, kgExpProy, kgProcReal, kgExpReal, hayReal };
}

function ventaDia(dia, data) {
  const prod = prodDelDia(dia, data);
  const proy = prod.reduce((s,p) => s + (parseFloat(p.kg_exportables_proy)||0) * (parseFloat(p.tarifa)||0), 0);
  const real = prod.reduce((s,p) => s + (parseFloat(p.venta)||0), 0);
  const hayReal = prod.some(p => parseFloat(p.venta) > 0);
  return { proy, real, hayReal };
}

function calcularDia(estructura_id, tipo_calculo, dia, data) {
  const fecha = fechaISO(data.anio, data.mes, dia);
  const { kgExpProy, kgExpReal, hayReal } = kgsDia(dia, data);
  const kgParaRatio = hayReal ? kgExpReal : kgExpProy;

  const itemProy = data.proyectado.find(p => String(p.estructura_id) === String(estructura_id));
  const valorProy = parseFloat(itemProy?.valor) || 0;

  let proy = tipo_calculo === 'ratio'
    ? valorProy * kgParaRatio
    : (data.diasMes > 0 ? valorProy / data.diasMes : 0);

  // Buscar ejecutado para CUALQUIER tipo (ratio o monto_mensual)
  const ie = data.ejecutado.find(e =>
    String(e.fecha).substring(0,10) === fecha &&
    String(e.estructura_id) === String(estructura_id)
  );
  let ejec = null;
  if (ie) {
    ejec = parseFloat(ie.valor_usd);
  } else if (tipo_calculo !== 'ratio') {
    ejec = proy; // monto_mensual sin override: usa proyectado
  }
  return { proy, ejec };
}

function valorEfectivo(proy, ejec) {
  // valor que se usa en el resumen: ejecutado si existe, proyectado si no
  return ejec !== null ? ejec : proy;
}

// ============================================================
// KPIs
// ============================================================
function renderKPIs(data) {
  let totalVenta = 0;
  const totN1 = {};
  for (let d = 1; d <= data.diasMes; d++) {
    const v = ventaDia(d, data);
    totalVenta += v.hayReal ? v.real : v.proy;
  }
  data.estructura.forEach(item => {
    let t = 0;
    for (let d = 1; d <= data.diasMes; d++) {
      const { proy, ejec } = calcularDia(item.id, item.tipo_calculo, d, data);
      t += valorEfectivo(proy, ejec);
    }
    totN1[item.nivel1] = (totN1[item.nivel1] || 0) + t;
  });
  const cdv = totN1['Costo Directo Variable'] || 0;
  const cdf = totN1['Costo Directo Fijo'] || 0;
  const civ = totN1['Costo Indirecto Variable'] || 0;
  const gf  = totN1['Gastos Fijos'] || 0;
  const mdc = totalVenta - cdv;
  const ub  = mdc - cdf - civ;
  const uop = ub - gf;

  document.getElementById('kpiRow').innerHTML = [
    { label:'Venta', valor:totalVenta, icon:'💰', color:'var(--verde)' },
    { label:'Margen contribución', valor:mdc, icon:'📈', color: mdc>=0?'var(--verde)':'var(--rojo)' },
    { label:'Utilidad bruta', valor:ub, icon:'⚖️', color: ub>=0?'var(--verde)':'var(--rojo)' },
    { label:'Utilidad operativa', valor:uop, icon: uop>=0?'✅':'❌', color: uop>=0?'var(--verde)':'var(--rojo)' },
  ].map(k => `
    <div class="card" style="flex:1;min-width:160px;padding:14px 18px;margin-bottom:0;">
      <div style="font-size:11px;color:var(--texto-sec);font-weight:500;text-transform:uppercase;">${k.label}</div>
      <div style="font-size:22px;font-weight:700;color:${k.color};margin-top:4px;">${k.icon} ${fmtMoneda(k.valor)}</div>
    </div>`).join('');
}

// ============================================================
// Render tabla diaria (corregida)
// ============================================================
function buildFila(clase, label, totalVal, diaVals, esKg = false) {
  const fmt = esKg ? (v => fmtNum(v, 0) + ' Kg') : fmtMoneda;
  let h = `<tr class="${clase}"><td class="col-estructura">${label}</td>`;
  h += `<td class="total-col font-bold">${fmt(totalVal)}</td>`;
  diaVals.forEach(v => { h += `<td>${fmt(v)}</td>`; });
  h += `</tr>`;
  return h;
}

function renderTabla(data) {
  const { estructura, diasMes, anio, mes } = data;
  const vista = VISTAS[vistaIdx];
  document.getElementById('placeholderMsg')?.remove();

  const nivel1s = [...new Set(estructura.map(i => i.nivel1))];

  // ---- Cabecera ----
  let html = `<table class="costos"><thead><tr>
    <th class="col-estructura">Ítem de costo</th>
    <th style="min-width:80px;background:#0d4a2a;">TOTAL</th>`;
  for (let d = 1; d <= diasMes; d++) {
    const dow = ['D','L','M','X','J','V','S'][new Date(anio,mes-1,d).getDay()];
    html += `<th style="min-width:72px;">${d}<br><span style="font-weight:400;opacity:.7;font-size:10px;">${dow}</span></th>`;
  }
  html += `</tr></thead><tbody>`;

  // ---- Filas de producción (KG) ----
  const kgProcDias=[], kgExpDias=[], ventaDias=[];
  for (let d=1; d<=diasMes; d++) {
    const k = kgsDia(d, data);
    const v = ventaDia(d, data);
    if (vista === 'proyectado') {
      kgProcDias.push(k.kgProcProy);
      kgExpDias.push(k.kgExpProy);
      ventaDias.push(v.proy);
    } else if (vista === 'ejecutado') {
      kgProcDias.push(k.hayReal ? k.kgProcReal : k.kgProcProy);
      kgExpDias.push(k.hayReal ? k.kgExpReal : k.kgExpProy);
      ventaDias.push(v.hayReal ? v.real : v.proy);
    } else { // ambos — mostramos efectivo
      kgProcDias.push(k.hayReal ? k.kgProcReal : k.kgProcProy);
      kgExpDias.push(k.hayReal ? k.kgExpReal : k.kgExpProy);
      ventaDias.push(v.hayReal ? v.real : v.proy);
    }
  }
  const totKgProc = kgProcDias.reduce((a,b)=>a+b,0);
  const totKgExp  = kgExpDias.reduce((a,b)=>a+b,0);
  const totVenta  = ventaDias.reduce((a,b)=>a+b,0);

  // KG procesados
  html += buildFila('resumen', '📦 KG Procesados', totKgProc, kgProcDias, true);
  // KG exportables
  html += buildFila('resumen', '✅ KG Exportables', totKgExp, kgExpDias, true);
  // Venta
  html += buildFila('resumen-venta', '💰 VENTA', totVenta, ventaDias);

  // ---- Filas de costos ----
  const totalesPorN1 = {}, diasPorN1 = {};
  nivel1s.forEach(n1 => { totalesPorN1[n1]=0; diasPorN1[n1]=new Array(diasMes).fill(0); });

  nivel1s.forEach(n1 => {
    const itemsN1 = estructura.filter(i => i.nivel1===n1);
    const nivel2s = [...new Set(itemsN1.map(i=>i.nivel2))];
    let totalN1=0; const diasN1=new Array(diasMes).fill(0);

    // Placeholder nivel1
    const plN1 = `__N1_${slug(n1)}__`;
    html += `<tr class="nivel1" data-n1="${n1}"><td class="col-estructura">${n1}</td>${plN1}</tr>`;

    nivel2s.forEach(n2 => {
      const itemsN2 = itemsN1.filter(i=>i.nivel2===n2);
      let totalN2=0; const diasN2=new Array(diasMes).fill(0);
      const plN2 = `__N2_${slug(n2)}__`;
      html += `<tr class="nivel2" data-n1="${n1}" data-n2="${n2}"><td class="col-estructura">${n2}</td>${plN2}</tr>`;

      itemsN2.forEach(item => {
        let rowTot=0; let cells='';
        for (let d=1; d<=diasMes; d++) {
          const { proy, ejec } = calcularDia(item.id, item.tipo_calculo, d, data);
          let val, display;
          if (vista==='ambos') {
            val = valorEfectivo(proy, ejec);
            display = ejec!==null
              ? `<span style="color:var(--verde-dark);font-weight:600;">${fmtMoneda(ejec)}</span>`
              : `<span style="opacity:.55;">${fmtMoneda(proy)}</span>`;
          } else if (vista==='proyectado') {
            val=proy; display=fmtMoneda(proy);
          } else {
            val=valorEfectivo(proy,ejec); display=fmtMoneda(val);
          }
          rowTot+=val; diasN2[d-1]+=val; diasN1[d-1]+=val; cells+=`<td>${display}</td>`;
        }
        totalN2+=rowTot; totalN1+=rowTot; totalesPorN1[n1]+=rowTot;
        html += `<tr class="nivel3" data-n1="${n1}" data-n2="${n2}">
          <td class="col-estructura">${item.nivel3}</td>
          <td class="total-col font-bold">${fmtMoneda(rowTot)}</td>${cells}</tr>`;
      });

      // Sustituir placeholder nivel2
      const n2cells = `<td class="total-col">${fmtMoneda(totalN2)}</td>`
        + diasN2.map(v=>`<td>${fmtMoneda(v)}</td>`).join('');
      html = html.replace(plN2, n2cells);
    });

    // Sustituir placeholder nivel1
    for (let d=0;d<diasMes;d++) diasPorN1[n1][d]=diasN1[d];
    totalesPorN1[n1]=totalN1;
    const n1cells = `<td class="total-col">${fmtMoneda(totalN1)}</td>`
      + diasN1.map(v=>`<td>${fmtMoneda(v)}</td>`).join('');
    html = html.replace(plN1, n1cells);

    // Filas de resumen
    if (n1==='Costo Directo Variable') {
      html += buildFila('resumen', '📊 MARGEN CONTRIBUCIÓN DIRECTO',
        totVenta-totalN1, ventaDias.map((v,i)=>v-diasN1[i]));
    }
    if (n1==='Costo Directo Fijo') {
      const mc2 = totVenta-(totalesPorN1['Costo Directo Variable']||0)-totalN1;
      html += buildFila('resumen', '📊 MARGEN CONTRIBUCIÓN TOTAL', mc2,
        ventaDias.map((v,i)=>v-(diasPorN1['Costo Directo Variable']?.[i]||0)-diasN1[i]));
    }
    if (n1==='Costo Indirecto Variable') {
      const ub = totVenta-(totalesPorN1['Costo Directo Variable']||0)-(totalesPorN1['Costo Directo Fijo']||0)-totalN1;
      html += buildFila('utilidad '+(ub>=0?'utilidad-pos':'utilidad-neg'), '⚖️ UTILIDAD BRUTA', ub,
        ventaDias.map((v,i)=>v-(diasPorN1['Costo Directo Variable']?.[i]||0)-(diasPorN1['Costo Directo Fijo']?.[i]||0)-diasN1[i]));
    }
    if (n1==='Gastos Fijos') {
      const uop = totVenta-(totalesPorN1['Costo Directo Variable']||0)-(totalesPorN1['Costo Directo Fijo']||0)-(totalesPorN1['Costo Indirecto Variable']||0)-totalN1;
      html += buildFila('utilidad '+(uop>=0?'utilidad-pos':'utilidad-neg'), '🏁 UTILIDAD OPERATIVA MAQUILA', uop,
        ventaDias.map((v,i)=>v-(diasPorN1['Costo Directo Variable']?.[i]||0)-(diasPorN1['Costo Directo Fijo']?.[i]||0)-(diasPorN1['Costo Indirecto Variable']?.[i]||0)-diasN1[i]));
    }
  });

  html += '</tbody></table>';
  const wrapper = document.getElementById('tablaWrapper');
  wrapper.innerHTML = html;
  bindCollapseEvents(wrapper);
  requestAnimationFrame(() => fixStickyRows(wrapper));
}

// ============================================================
// Render resumen mensual
// ============================================================
function renderResumen(data) {
  const { estructura, diasMes } = data;

  // Calcular totales del mes por item
  let totalVentaMes = 0, totalVentaProy = 0;
  for (let d=1; d<=diasMes; d++) {
    const v = ventaDia(d, data);
    totalVentaMes  += v.hayReal ? v.real : v.proy;
    totalVentaProy += v.proy;
  }

  // Agrupar por nivel1
  const nivel1s = [...new Set(estructura.map(i=>i.nivel1))];
  const totMesPorN1={}, totProyPorN1={}, totEjecPorN1={};

  let html = `<table class="costos"><thead><tr>
    <th class="col-estructura" style="min-width:220px;">Ítem de costo</th>
    <th style="min-width:120px;text-align:right;">Proyectado</th>
    <th style="min-width:120px;text-align:right;">Ejecutado</th>
    <th style="min-width:120px;text-align:right;background:#0d4a2a;">Total mes</th>
    <th style="min-width:90px;text-align:right;">% s/ Venta</th>
  </tr></thead><tbody>`;

  // Fila venta
  const pctVenta = totalVentaMes > 0 ? 100 : 0;
  html += `<tr class="resumen-venta">
    <td class="col-estructura">💰 VENTA</td>
    <td style="text-align:right;">${fmtMoneda(totalVentaProy)}</td>
    <td style="text-align:right;">—</td>
    <td class="total-col" style="text-align:right;">${fmtMoneda(totalVentaMes)}</td>
    <td style="text-align:right;">100%</td>
  </tr>`;

  nivel1s.forEach(n1 => {
    const itemsN1 = estructura.filter(i=>i.nivel1===n1);
    const nivel2s = [...new Set(itemsN1.map(i=>i.nivel2))];
    let totalN1Mes=0, totalN1Proy=0, totalN1Ejec=0;

    // Placeholder nivel1
    const plN1 = `__RN1_${slug(n1)}__`;
    html += `<tr class="nivel1" data-n1="${n1}"><td class="col-estructura">${n1}</td>${plN1}</tr>`;

    nivel2s.forEach(n2 => {
      const itemsN2 = itemsN1.filter(i=>i.nivel2===n2);
      let totN2Mes=0, totN2Proy=0, totN2Ejec=0;
      const plN2 = `__RN2_${slug(n2)}__`;
      html += `<tr class="nivel2" data-n1="${n1}" data-n2="${n2}"><td class="col-estructura">${n2}</td>${plN2}</tr>`;

      itemsN2.forEach(item => {
        let sMes=0, sProy=0, sEjec=0, tieneEjec=false;
        for (let d=1; d<=diasMes; d++) {
          const { proy, ejec } = calcularDia(item.id, item.tipo_calculo, d, data);
          sProy += proy;
          if (ejec !== null) { sEjec += ejec; tieneEjec = true; }
          else { sEjec += proy; }
          sMes += valorEfectivo(proy, ejec);
        }
        const pct = totalVentaMes > 0 ? (sMes/totalVentaMes*100) : 0;
        totN2Mes+=sMes; totN2Proy+=sProy; totN2Ejec+=sEjec;
        html += `<tr class="nivel3" data-n1="${n1}" data-n2="${n2}">
          <td class="col-estructura">${item.nivel3}</td>
          <td style="text-align:right;">${fmtMoneda(sProy)}</td>
          <td style="text-align:right;">${tieneEjec?fmtMoneda(sEjec):'—'}</td>
          <td class="total-col" style="text-align:right;">${fmtMoneda(sMes)}</td>
          <td style="text-align:right;">${fmtPct(pct)}</td>
        </tr>`;
      });

      const pctN2 = totalVentaMes>0?(totN2Mes/totalVentaMes*100):0;
      html = html.replace(plN2,
        `<td style="text-align:right;">${fmtMoneda(totN2Proy)}</td>
         <td style="text-align:right;">${fmtMoneda(totN2Ejec)}</td>
         <td class="total-col" style="text-align:right;">${fmtMoneda(totN2Mes)}</td>
         <td style="text-align:right;">${fmtPct(pctN2)}</td>`);
      totalN1Mes+=totN2Mes; totalN1Proy+=totN2Proy; totalN1Ejec+=totN2Ejec;
    });

    const pctN1 = totalVentaMes>0?(totalN1Mes/totalVentaMes*100):0;
    html = html.replace(plN1,
      `<td style="text-align:right;">${fmtMoneda(totalN1Proy)}</td>
       <td style="text-align:right;">${fmtMoneda(totalN1Ejec)}</td>
       <td class="total-col" style="text-align:right;">${fmtMoneda(totalN1Mes)}</td>
       <td style="text-align:right;">${fmtPct(pctN1)}</td>`);
    totMesPorN1[n1]=totalN1Mes; totProyPorN1[n1]=totalN1Proy; totEjecPorN1[n1]=totalN1Ejec;

    // Filas de resumen
    function filaResumenMes(label, mes, proy, ejec, grande=false) {
      const pct = totalVentaMes>0?(mes/totalVentaMes*100):0;
      const clase = grande ? (mes>=0?'utilidad utilidad-pos':'utilidad utilidad-neg') : 'resumen';
      return `<tr class="${clase}">
        <td class="col-estructura">${label}</td>
        <td style="text-align:right;">${fmtMoneda(proy)}</td>
        <td style="text-align:right;">—</td>
        <td class="total-col" style="text-align:right;">${fmtMoneda(mes)}</td>
        <td style="text-align:right;">${fmtPct(pct)}</td>
      </tr>`;
    }

    if (n1==='Costo Directo Variable') {
      const mc=totalVentaMes-(totMesPorN1['Costo Directo Variable']||0);
      const mp=totalVentaProy-(totProyPorN1['Costo Directo Variable']||0);
      html+=filaResumenMes('📊 MARGEN CONTRIBUCIÓN DIRECTO',mc,mp,0);
    }
    if (n1==='Costo Directo Fijo') {
      const mc2=totalVentaMes-(totMesPorN1['Costo Directo Variable']||0)-(totMesPorN1['Costo Directo Fijo']||0);
      const mp2=totalVentaProy-(totProyPorN1['Costo Directo Variable']||0)-(totProyPorN1['Costo Directo Fijo']||0);
      html+=filaResumenMes('📊 MARGEN CONTRIBUCIÓN TOTAL',mc2,mp2,0);
    }
    if (n1==='Costo Indirecto Variable') {
      const ub=totalVentaMes-(totMesPorN1['Costo Directo Variable']||0)-(totMesPorN1['Costo Directo Fijo']||0)-(totMesPorN1['Costo Indirecto Variable']||0);
      const ubp=totalVentaProy-(totProyPorN1['Costo Directo Variable']||0)-(totProyPorN1['Costo Directo Fijo']||0)-(totProyPorN1['Costo Indirecto Variable']||0);
      html+=filaResumenMes('⚖️ UTILIDAD BRUTA',ub,ubp,0,true);
    }
    if (n1==='Gastos Fijos') {
      const uop=totalVentaMes-(totMesPorN1['Costo Directo Variable']||0)-(totMesPorN1['Costo Directo Fijo']||0)-(totMesPorN1['Costo Indirecto Variable']||0)-(totMesPorN1['Gastos Fijos']||0);
      const uopp=totalVentaProy-(totProyPorN1['Costo Directo Variable']||0)-(totProyPorN1['Costo Directo Fijo']||0)-(totProyPorN1['Costo Indirecto Variable']||0)-(totProyPorN1['Gastos Fijos']||0);
      html+=filaResumenMes('🏁 UTILIDAD OPERATIVA MAQUILA',uop,uopp,0,true);
    }
  });

  html += '</tbody></table>';
  const wrapper = document.getElementById('tablaResumenWrapper');
  wrapper.innerHTML = html;
  bindCollapseEvents(wrapper);
}

// ============================================================
// Colapsar / expandir (scoped al wrapper para evitar conflictos entre tablas)
// ============================================================
function bindCollapseEvents(wrapper) {
  wrapper.querySelectorAll('tr.nivel1').forEach(tr => {
    tr.querySelector('.col-estructura').addEventListener('click', () => {
      const n1 = tr.dataset.n1;
      const collapsed = tr.classList.toggle('collapsed');
      wrapper.querySelectorAll(`tr[data-n1="${n1}"].nivel2, tr[data-n1="${n1}"].nivel3`)
        .forEach(r => r.classList.toggle('hidden', collapsed));
    });
  });
  wrapper.querySelectorAll('tr.nivel2').forEach(tr => {
    tr.querySelector('.col-estructura').addEventListener('click', e => {
      e.stopPropagation();
      const { n1, n2 } = tr.dataset;
      const collapsed = tr.classList.toggle('collapsed');
      wrapper.querySelectorAll(`tr.nivel3[data-n1="${n1}"][data-n2="${n2}"]`)
        .forEach(r => r.classList.toggle('hidden', collapsed));
    });
  });
}

// ============================================================
// Fijar filas de KG / VENTA debajo del encabezado sticky
// ============================================================
function fixStickyRows(wrapper) {
  const headerTr = wrapper.querySelector('thead tr');
  if (!headerTr) return;
  const headerH = headerTr.getBoundingClientRect().height;
  let cumTop = headerH;
  wrapper.querySelectorAll('tbody tr.resumen, tbody tr.resumen-venta').forEach(tr => {
    tr.querySelectorAll('td').forEach(td => {
      td.style.position = 'sticky';
      td.style.top = Math.round(cumTop) + 'px';
      td.style.zIndex = '80';
    });
    cumTop += tr.getBoundingClientRect().height;
  });
}

function slug(s) { return s.replace(/[^a-zA-Z0-9]/g,'_'); }

cargarMes();
