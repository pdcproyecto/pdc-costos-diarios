<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Costos — Iniciar sesión</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>📊 Control de Costos</h1>
      <p>Packing del Carmen SAC</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Usuario (email)</label>
        <input type="text" id="email" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div id="errorMsg" class="hidden" style="color:var(--rojo);font-size:13px;margin-bottom:12px;padding:8px;background:#fee2e2;border-radius:6px;"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="btnLogin">
        Ingresar
      </button>
    </form>
  </div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script>
  // Si ya está logueado, redirigir
  if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Ingresando...';
    errorMsg.classList.add('hidden');

    try {
      const passwordHash = await Auth.hashPassword(password);
      const res = await fetch(CONFIG.GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'login', email, password: passwordHash }),
      });
      const data = await res.json();

      if (data.ok) {
        Auth.save(data.token, data.nombre, data.rol);
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.textContent = data.error || 'Credenciales incorrectas';
        errorMsg.classList.remove('hidden');
      }
    } catch (err) {
      errorMsg.textContent = 'Error de conexión. Verifica la URL del servidor.';
      errorMsg.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  });
</script>
</body>
</html>
